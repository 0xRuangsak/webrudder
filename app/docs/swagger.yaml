basePath: /
definitions:
  browser.Action:
    properties:
      do:
        type: string
      file:
        type: string
      ref:
        type: string
      text:
        type: string
      url:
        type: string
    type: object
  browser.Element:
    properties:
      accept:
        description: file input accept attribute
        type: string
      href:
        type: string
      kind:
        description: '"upload" | "download" when statically known'
        type: string
      name:
        type: string
      ref:
        type: string
      role:
        type: string
      type:
        type: string
    type: object
  server.BatchReq:
    properties:
      actions:
        items:
          $ref: '#/definitions/browser.Action'
        type: array
    type: object
  server.BatchResp:
    properties:
      ok:
        type: boolean
      results:
        items:
          additionalProperties: {}
          type: object
        type: array
    type: object
  server.CheckReq:
    properties:
      checked:
        example: true
        type: boolean
      ref:
        example: e4
        type: string
    type: object
  server.ClickReq:
    properties:
      ref:
        example: e1
        type: string
    type: object
  server.ClickResp:
    properties:
      downloaded:
        type: string
      navigated:
        type: boolean
      needs_file:
        type: boolean
      ok:
        type: boolean
      url:
        type: string
    type: object
  server.DownloadReq:
    properties:
      dir:
        type: string
      ref:
        example: e7
        type: string
    type: object
  server.DownloadResp:
    properties:
      ok:
        type: boolean
      saved:
        type: string
    type: object
  server.ErrResp:
    properties:
      error:
        example: ref "e9" not found — re-scan the page
        type: string
      ok:
        type: boolean
    type: object
  server.FillReq:
    properties:
      ref:
        example: e2
        type: string
      text:
        example: user@example.com
        type: string
    type: object
  server.GotoReq:
    properties:
      url:
        example: https://example.com
        type: string
    type: object
  server.GotoResp:
    properties:
      ok:
        type: boolean
      url:
        type: string
    type: object
  server.HoverReq:
    properties:
      ref:
        example: e1
        type: string
    type: object
  server.OKResp:
    properties:
      ok:
        type: boolean
    type: object
  server.PressReq:
    properties:
      key:
        example: Enter
        type: string
    type: object
  server.ReadResp:
    properties:
      text:
        type: string
      title:
        type: string
      url:
        type: string
    type: object
  server.ScanResp:
    properties:
      elements:
        items:
          $ref: '#/definitions/browser.Element'
        type: array
    type: object
  server.ScrollReq:
    properties:
      amount:
        type: number
      dir:
        example: down
        type: string
      ref:
        type: string
    type: object
  server.SelectReq:
    properties:
      ref:
        example: e3
        type: string
      values:
        items:
          type: string
        type: array
    type: object
  server.StatusResp:
    properties:
      port:
        type: integer
      title:
        type: string
      url:
        type: string
    type: object
  server.TypeReq:
    properties:
      text:
        example: hello
        type: string
    type: object
  server.UploadReq:
    properties:
      file:
        example: ./avatar.png
        type: string
      ref:
        example: e5
        type: string
    type: object
  server.WaitReq:
    properties:
      gone:
        type: boolean
      ms:
        type: integer
      selector:
        type: string
      text:
        type: string
    type: object
info:
  contact: {}
  description: Browser automation daemon — navigate, interact, and extract from a
    live headless browser. One browser per port.
  license:
    name: MIT
  title: webrudder API
  version: "1.0"
paths:
  /back:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.GotoResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Navigate back
      tags:
      - interact
  /batch:
    post:
      consumes:
      - application/json
      parameters:
      - description: ordered actions
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.BatchReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.BatchResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Run multiple actions in one request
      tags:
      - interact
  /check:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref and desired checked state
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.CheckReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Set a checkbox/radio to checked/unchecked
      tags:
      - interact
  /click:
    post:
      consumes:
      - application/json
      parameters:
      - description: element ref
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.ClickReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ClickResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Click an element by ref
      tags:
      - interact
  /download:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref and optional dir
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.DownloadReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.DownloadResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Click an element, wait for the download, return the saved path
      tags:
      - interact
  /fill:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref and text
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.FillReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Type text into an input/textarea by ref
      tags:
      - interact
  /forward:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.GotoResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Navigate forward
      tags:
      - interact
  /goto:
    post:
      consumes:
      - application/json
      parameters:
      - description: target url
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.GotoReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.GotoResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Navigate to an absolute URL (explicit jump)
      tags:
      - interact
  /hover:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.HoverReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Hover an element by ref
      tags:
      - interact
  /html:
    get:
      parameters:
      - description: element ref for outerHTML; omit for the full page
        in: query
        name: ref
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: OK
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Raw outer HTML (full page, or a single element via ?ref)
      tags:
      - read
  /press:
    post:
      consumes:
      - application/json
      parameters:
      - description: key
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.PressReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Press a key or chord (Enter, Tab, ArrowDown, Control+a)
      tags:
      - interact
  /read:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ReadResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Extract page URL, title, and visible text
      tags:
      - read
  /reload:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.GotoResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Reload the current page
      tags:
      - interact
  /scan:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.ScanResp'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: List actionable elements (assigns refs e1, e2, …)
      tags:
      - read
  /scroll:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref or dir+amount
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.ScrollReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Scroll the page (dir+amount) or an element into view (ref)
      tags:
      - interact
  /select:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref and values
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.SelectReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Select dropdown option(s) by visible text
      tags:
      - interact
  /shutdown:
    post:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
      summary: Stop the daemon and browser
      tags:
      - control
  /snap:
    get:
      parameters:
      - description: full scrollable page (default true); false = viewport only
        in: query
        name: full
        type: boolean
      produces:
      - image/png
      responses:
        "200":
          description: OK
          schema:
            type: file
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Screenshot the page (PNG, full page by default)
      tags:
      - read
  /snapshot:
    get:
      produces:
      - text/plain
      responses:
        "200":
          description: OK
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Accessibility-tree outline (role + name + ARIA state, as text)
      tags:
      - read
  /status:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.StatusResp'
      summary: Current URL, title, and port
      tags:
      - read
  /type:
    post:
      consumes:
      - application/json
      parameters:
      - description: text
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.TypeReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Type text into the focused element
      tags:
      - interact
  /upload:
    post:
      consumes:
      - application/json
      parameters:
      - description: ref and local file path
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.UploadReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Attach a local file to a file input by ref
      tags:
      - interact
  /wait:
    post:
      consumes:
      - application/json
      parameters:
      - description: selector|text|ms (+gone)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/server.WaitReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.OKResp'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/server.ErrResp'
      summary: Wait for a selector or text, or a fixed delay (ms)
      tags:
      - interact
swagger: "2.0"
